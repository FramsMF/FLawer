<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Семецветик на фоне</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Fallback градиент фон */
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: Arial, sans-serif;
      position: relative;
    }

    /* Если есть фон.jpg — раскомментируйте */
    /*
    body {
      background-image: url("фон.jpg");
      background-size: cover;
      background-position: center;
    }
    */

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      background: rgba(255,255,255,0.95);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      z-index: 10;
      transition: all 0.2s;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    #flower {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      /* Fallback SVG цветок */
      background: 
        radial-gradient(circle at 30% 30%, #ff9a9e 0%, transparent 50%),
        radial-gradient(circle at 70% 30%, #fecfef 0%, transparent 50%),
        radial-gradient(circle at 50% 70%, #fad0c4 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, #ffd1ff 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #f8b500 0%, transparent 50%);
      border-radius: 50% 40% 50% 40%;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 5;
      box-shadow: 0 0 20px rgba(255,182,193,0.8);
    }

    /* Если есть семецветик.jpg — раскомментируйте */
    /*
    #flower {
      background-image: url("семецветик.jpg");
      background-size: contain;
      background-repeat: no-repeat;
      box-shadow: none;
    }
    */

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      to { transform: translate(-50%, -50%) rotate(360deg) scale(1.1); }
    }

    #flower.visible {
      opacity: 1;
      animation: spin 3s linear infinite;
    }

    /* Уведомление об ошибках */
    .error {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #ff4444;
      color: white;
      padding: 10px;
      border-radius: 5px;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>
  <div id="error" class="error"></div>
  <button id="showFlower">🌸 Показать цветок</button>
  <div id="flower"></div>

  <script>
    (function() {
      'use strict';
      
      const button = document.getElementById('showFlower');
      const flower = document.getElementById('flower');
      const errorDiv = document.getElementById('error');
      
      if (!button || !flower) {
        errorDiv.textContent = 'Ошибка: не найдены элементы кнопки или цветка';
        errorDiv.style.display = 'block';
        return;
      }
      
      button.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        flower.classList.add('visible');
        
        // Скрыть кнопку через 2 секунды
        setTimeout(() => {
          button.style.opacity = '0';
          button.style.pointerEvents = 'none';
        }, 2000);
        
        console.log('Цветок показан!');
      });
      
      // Проверка изображений
      const imgTest = new Image();
      imgTest.onerror = () => console.log('Изображения не найдены — используется fallback');
      imgTest.src = 'семецветик.jpg';
      
    })();
  </script>
</body>
</html>
