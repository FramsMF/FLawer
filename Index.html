<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Семецветик на фоне</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("фон.jpg");        /* ← фон */
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      z-index: 2;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #flower {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background-image: url("семецветик.jpg");  /* ← цветок */
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    #flower.visible {
      opacity: 1;
      animation: spin 3s linear infinite;
    }
  </style>
</head>
