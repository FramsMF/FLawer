<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Цветок</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    .btn {
      padding: 18px 40px;
      font-size: 22px;
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      color: #5a67d8;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .flower {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 140px;
      height: 140px;
      transform: translate(-50%, -50%) scale(0);
      background: 
        radial-gradient(ellipse 40% 50% at 30% 20%, #ff6b9d 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 70% 20%, #feca57 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 50% 60%, #48dbfb 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 20% 80%, #ff9ff3 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 80% 80%, #54a0ff 0%, transparent 70%),
        radial-gradient(circle 25% at 50% 50%, #fff 0%, #ffeaa7 100%);
      border-radius: 60% 40% 50% 50%;
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 5;
      box-shadow: 
        0 0 30px rgba(255,107,157,0.6),
        inset 0 0 20px rgba(255,255,255,0.4);
    }

    .flower.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(360deg);
      animation: bloom 4s ease-in-out infinite;
    }

    @keyframes bloom {
      0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      25% { transform: translate(-50%, -50%) scale(1.1) rotate(90deg); }
      50% { transform: translate(-50%, -50%) scale(1.05) rotate(180deg); }
      75% { transform: translate(-50%, -50%) scale(1.15) rotate(270deg); }
    }

    /* Частицы */
    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #ff6b9d;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn" id="magicBtn">✨ Волшебный цветок ✨</button>
  </div>
  <div class="flower" id="flower"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('magicBtn');
      const flower = document.getElementById('flower');
      
      btn.addEventListener('click', function() {
        // Показать цветок
        flower.classList.add('show');
        
        // Скрыть кнопку
        btn.style.opacity = '0';
        btn.style.transform = 'scale(0.5)';
        
        // Создать частицы
        createParticles();
        
        // Звук (опционально)
        playMagicSound();
      });
      
      function createParticles() {
        for(let i = 0; i < 20; i++) {
          setTimeout(() => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = '50%';
            particle.style.top = '50%';
            particle.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
            document.body.appendChild(particle);
            
            // Анимация частицы
            particle.animate([
              { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
              { transform: `translate(${ (Math.random()-0.5)*400 }px, ${ (Math.random()-0.5)*400 }px) scale(0)`, opacity: 0 }
            ], {
              duration: 2000 + Math.random()*1000,
              easing: 'ease-out'
            }).onfinish = () => particle.remove();
          }, i * 50);
        }
      }
      
      function playMagicSound() {
        // Web Audio API для магического звука
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 1);
      }
    });
  </script>
</body>
</html>
