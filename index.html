<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Цветок</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    .btn {
      padding: 18px 40px;
      font-size: 22px;
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      color: #5a67d8;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .flower-img {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      max-width: 80vw;
      height: auto;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 5;
      filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.45));
      border-radius: 20px;
    }

    .flower-img.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      animation: bloom 4s ease-in-out infinite;
    }

    @keyframes bloom {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      25% { transform: translate(-50%, -50%) scale(1.05); }
      50% { transform: translate(-50%, -50%) scale(1.02); }
      75% { transform: translate(-50%, -50%) scale(1.08); }
    }

    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #ff6b9d;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="btn" id="magicBtn">✨ Волшебный цветок ✨</button>
  </div>

  <img src="./семецветик.jpg" alt="Цветок" class="flower-img" id="flowerImg">

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('magicBtn');
      const flowerImg = document.getElementById('flowerImg');
      
      btn.addEventListener('click', function() {
        flowerImg.classList.add('show');
        btn.style.opacity = '0';
        btn.style.transform = 'scale(0.5)';
        createParticles();
        playMagicSound();
      });
      
      function createParticles() {
        for(let i = 0; i < 20; i++) {
          setTimeout(() => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = '50%';
            particle.style.top = '50%';
            particle.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
            document.body.appendChild(particle);
            
            particle.animate([
              { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
              { transform: `translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px) scale(0)`, opacity: 0 }
            ], {
              duration: 2000 + Math.random()*1000,
              easing: 'ease-out'
            }).onfinish = () => particle.remove();
          }, i * 50);
        }
      }
      
      function playMagicSound() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        
        const audioCtx = new AudioContextClass();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 1);
      }
    });
  </script>
</body>
</html>
